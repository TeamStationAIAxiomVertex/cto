# Firebase App Hosting configuration
runConfig:
  minInstances: 1
  maxInstances: 50
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: NEXT_PUBLIC_SITE_NAME
    value: "TeamStation AI"
    availability:
      - BUILD
      - RUNTIME

  # Production environment settings
  - variable: NODE_ENV
    value: "production"
    availability:
      - RUNTIME
  - variable: LOG_LEVEL
    value: "warn"
    availability:
      - RUNTIME

  # BREAK-GLASS to force a build even if TS/ESLint fail (BUILD only)
  - variable: BREAK_GLASS
    value: "1" # BREAK_GLASS ACTIVATED TO BYPASS DEPLOYMENT BLOCKER
    availability:
      - BUILD
