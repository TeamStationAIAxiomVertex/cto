# Firebase App Hosting configuration
runConfig:
  minInstances: 1
  maxInstances: 50
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: NEXT_PUBLIC_SITE_NAME
    value: "TeamStation AI"
    availability:
      - BUILD
      - RUNTIME

  # BREAK-GLASS to force a build even if TS/ESLint fail (BUILD only)
  - variable: BREAK_GLASS
    value: "0"   # set "1" TEMPORARILY only if you must bypass lint/type errors
    availability:
      - BUILD
