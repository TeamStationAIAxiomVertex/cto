# Firebase App Hosting configuration
runConfig:
  minInstances: 1
  maxInstances: 50
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  # Public env example (available at BUILD and RUNTIME)
  - variable: NEXT_PUBLIC_SITE_NAME
    value: TeamStation AI
    availability:
      - BUILD
      - RUNTIME

  # BREAK-GLASS to force a build even if TS/ESLint fail (BUILD only)
  - variable: BREAK_GLASS
    value: "0"         # set to "1" temporarily to push through a build
    availability:
      - BUILD

# Optional: force a faster build when you must publish despite lint (uncomment in an emergency)
# scripts:
#   buildCommand: npm run build:fast
