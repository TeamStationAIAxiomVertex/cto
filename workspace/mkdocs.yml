theme:
  name: material
  logo: assets/images/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: 'blue'
      accent: 'blue'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: 'blue'
      accent: 'blue'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
plugins:
    - search
    - material/social
    - material/tags
extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/teamstation
      name: TeamStation on LinkedIn
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@teamstation
      name: TeamStation on YouTube
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/teamstation
      name: TeamStation on Twitter
  generator: false

