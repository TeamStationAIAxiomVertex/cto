# Firebase App Hosting configuration
runConfig:
  minInstances: 1
  maxInstances: 50
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: NEXT_PUBLIC_SITE_NAME
    value: "TeamStation AI"
    availability:
      - BUILD
      - RUNTIME

  # Production environment settings
  - variable: NODE_ENV
    value: "production"
    availability:
      - RUNTIME
  - variable: LOG_LEVEL
    value: "warn"
    availability:
      - RUNTIME

  # Only flip to "1" if you truly need to bypass TS during build
  - variable: BREAK_GLASS
    value: "0"
    availability:
      - BUILD
  
  - variable: FORCE_WRITE
    value: "1"
    availability:
      - BUILD

  - variable: STRICT_ALIAS_REWRITE
    value: "1"
    availability:
      - BUILD
