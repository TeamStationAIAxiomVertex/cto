
# Firebase App Hosting configuration
runConfig:
  minInstances: 1
  maxInstances: 50
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  - variable: NEXT_PUBLIC_SITE_NAME
    value: "TeamStation AI"
    availability: [BUILD, RUNTIME]

  - variable: NODE_ENV
    value: "production"
    availability: [BUILD, RUNTIME]

  - variable: LOG_LEVEL
    value: "warn"
    availability: [BUILD, RUNTIME]
  
  - variable: BREAK_GLASS
    value: "0"
    availability: [BUILD]

  - variable: FORCE_WRITE
    value: "1"
    availability: [BUILD]

  - variable: STRICT_ALIAS_REWRITE
    value: "1"
    availability: [BUILD]
    
  - variable: NEXT_PUBLIC_SITE_URL
    value: "https://cto.teamstation.dev"
    availability: [BUILD, RUNTIME]
